<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="360" viewBox="0 0 1120 360" role="img" aria-labelledby="t d">
  <title id="t">How a VIPER scan works</title>
  <desc id="d">Scope is checked first, then VIPER maps the app surface, probes it, confirms every finding with evidence, and publishes only a sanitized view to the dashboard.</desc>
  <defs>
    <style>
      .card{fill:#f7f9fc;stroke:#e2e7ef;stroke-width:1.5}
      .ic{fill:none;stroke:#ef2331;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}
      .lbl{fill:#10151d;font:700 18px Inter,Segoe UI,Arial,sans-serif;text-anchor:middle}
      .sub{fill:#6a7482;font:400 12.5px Inter,Segoe UI,Arial,sans-serif;text-anchor:middle}
      .cap{fill:#8a929e;font:600 12px Inter,Segoe UI,Arial,sans-serif;text-anchor:middle;letter-spacing:.4px}
      .num{fill:#fff;font:700 12px Inter,Segoe UI,Arial,sans-serif;text-anchor:middle}
      .flow{stroke:#c3cad5;stroke-width:2.4}
      .title{fill:#10151d;font:700 24px Inter,Segoe UI,Arial,sans-serif}
      .foot{fill:#6a7482;font:400 15px Inter,Segoe UI,Arial,sans-serif}
    </style>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 9 4.5 0 9Z" fill="#ef2331"/></marker>
  </defs>

  <rect width="1120" height="360" rx="18" fill="#ffffff"/>
  <text x="45" y="52" class="title">How a VIPER scan works</text>

  <!-- flow arrows -->
  <g class="flow" marker-end="url(#ah)">
    <path d="M195 167 H262"/>
    <path d="M415 167 H482"/>
    <path d="M635 167 H702"/>
    <path d="M855 167 H922"/>
  </g>
  <!-- arrow number badges + captions -->
  <g>
    <text x="228" y="150" class="cap">MAP</text>       <circle cx="228" cy="167" r="11" fill="#ef2331"/><text x="228" y="171" class="num">1</text>
    <text x="448" y="150" class="cap">ATTACK</text>    <circle cx="448" cy="167" r="11" fill="#ef2331"/><text x="448" y="171" class="num">2</text>
    <text x="668" y="150" class="cap">CONFIRM</text>   <circle cx="668" cy="167" r="11" fill="#ef2331"/><text x="668" y="171" class="num">3</text>
    <text x="888" y="150" class="cap">PUBLISH</text>   <circle cx="888" cy="167" r="11" fill="#ef2331"/><text x="888" y="171" class="num">4</text>
  </g>

  <!-- Node 1: Scope -->
  <g>
    <rect x="45" y="90" width="150" height="155" rx="14" class="card"/>
    <g transform="translate(120 133)"><path class="ic" d="M0 -18 L15 -11 V1 C15 12 8 17 0 20 C-8 17 -15 12 -15 1 V-11 Z"/><path class="ic" d="M-6 0 L-1 6 L8 -6"/></g>
    <text x="120" y="203" class="lbl">Scope</text>
    <text x="120" y="225" class="sub">authorized target</text>
  </g>
  <!-- Node 2: Surface -->
  <g>
    <rect x="265" y="90" width="150" height="155" rx="14" class="card"/>
    <g transform="translate(340 133)"><circle class="ic" cx="-4" cy="-4" r="11"/><path class="ic" d="M4.5 4.5 L14 14"/></g>
    <text x="340" y="203" class="lbl">Surface</text>
    <text x="340" y="225" class="sub">hosts · URLs · params · JS</text>
  </g>
  <!-- Node 3: Probe -->
  <g>
    <rect x="485" y="90" width="150" height="155" rx="14" class="card"/>
    <g transform="translate(560 133)"><circle class="ic" cx="0" cy="0" r="13"/><circle class="ic" cx="0" cy="0" r="4.5"/><path class="ic" d="M0 -18 V-13 M0 13 V18 M-18 0 H-13 M13 0 H18"/></g>
    <text x="560" y="203" class="lbl">Probe</text>
    <text x="560" y="225" class="sub">SQLi · XSS · IDOR · JWT</text>
  </g>
  <!-- Node 4: Evidence -->
  <g>
    <rect x="705" y="90" width="150" height="155" rx="14" class="card"/>
    <g transform="translate(780 133)"><circle class="ic" cx="0" cy="0" r="14"/><path class="ic" d="M-6.5 0 L-1.5 6 L8 -7"/></g>
    <text x="780" y="203" class="lbl">Evidence</text>
    <text x="780" y="225" class="sub">proof, or it's dropped</text>
  </g>
  <!-- Node 5: Dashboard -->
  <g>
    <rect x="925" y="90" width="150" height="155" rx="14" class="card"/>
    <g transform="translate(1000 133)"><rect class="ic" x="-16" y="-13" width="32" height="22" rx="2.5"/><path class="ic" d="M-6 13 H6 M0 9 V13"/><path class="ic" d="M-9 3 V-2 M-2 3 V-6 M5 3 V0 M10 3 V-4"/></g>
    <text x="1000" y="203" class="lbl">Dashboard</text>
    <text x="1000" y="225" class="sub">findings + PoC</text>
  </g>

  <path d="M45 297 H1075" stroke="#eceff4" stroke-width="1.5"/>
  <text x="45" y="328" class="foot">Scope is checked before any request. Credentials, raw traffic, and internal logs never reach the public dashboard.</text>
</svg>
