<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="560" viewBox="0 0 1440 560" role="img" aria-labelledby="title desc">
  <title id="title">VIPER bounded analysis architecture</title>
  <desc id="desc">Authorization and fixed scope enter the control plane. Producers normalize operations, the workflow graph binds context, verification checks evidence, and a privacy projection supplies the dashboard.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0d1218"/><stop offset="1" stop-color="#111b27"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="12" stdDeviation="12" flood-opacity=".28"/></filter>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0 9 4.5 0 9Z" fill="#59708a"/></marker>
  </defs>
  <rect width="1440" height="560" rx="28" fill="url(#bg)"/>
  <text x="64" y="68" fill="#65a8ff" font-family="ui-monospace,monospace" font-size="16" font-weight="700" letter-spacing="3">BOUNDED ANALYSIS PATH</text>
  <text x="64" y="106" fill="#e8eef4" font-family="Inter,Arial,sans-serif" font-size="29" font-weight="700">Context stays attached from authority to evidence.</text>
  <g filter="url(#shadow)" font-family="Inter,Arial,sans-serif">
    <g transform="translate(64 176)"><rect width="220" height="216" rx="18" fill="#151f29" stroke="#2a3a49"/><text x="24" y="40" fill="#6faeff" font-size="13" font-weight="700">01 / AUTHORITY</text><text x="24" y="79" fill="#f1f5f8" font-size="21" font-weight="700">Scope contract</text><text x="24" y="113" fill="#97a7b6" font-size="15">Consent</text><text x="24" y="141" fill="#97a7b6" font-size="15">Fixed target identity</text><text x="24" y="169" fill="#97a7b6" font-size="15">Bounded budgets</text><text x="24" y="197" fill="#58c493" font-size="13">fail closed</text></g>
    <g transform="translate(340 176)"><rect width="220" height="216" rx="18" fill="#151f29" stroke="#2a3a49"/><text x="24" y="40" fill="#6faeff" font-size="13" font-weight="700">02 / CONTROL</text><text x="24" y="79" fill="#f1f5f8" font-size="21" font-weight="700">Stage lifecycle</text><text x="24" y="113" fill="#97a7b6" font-size="15">Ownership</text><text x="24" y="141" fill="#97a7b6" font-size="15">Cancellation</text><text x="24" y="169" fill="#97a7b6" font-size="15">Measured work</text><text x="24" y="197" fill="#58c493" font-size="13">canonical ledger</text></g>
    <g transform="translate(616 176)"><rect width="220" height="216" rx="18" fill="#151f29" stroke="#2a3a49"/><text x="24" y="40" fill="#6faeff" font-size="13" font-weight="700">03 / OPERATIONS</text><text x="24" y="79" fill="#f1f5f8" font-size="21" font-weight="700">Workflow graph</text><text x="24" y="113" fill="#97a7b6" font-size="15">Normalized requests</text><text x="24" y="141" fill="#97a7b6" font-size="15">Role-aware binding</text><text x="24" y="169" fill="#97a7b6" font-size="15">Temporary values</text><text x="24" y="197" fill="#58c493" font-size="13">exact occurrence</text></g>
    <g transform="translate(892 176)"><rect width="220" height="216" rx="18" fill="#151f29" stroke="#2a3a49"/><text x="24" y="40" fill="#6faeff" font-size="13" font-weight="700">04 / EVIDENCE</text><text x="24" y="79" fill="#f1f5f8" font-size="21" font-weight="700">Verification</text><text x="24" y="113" fill="#97a7b6" font-size="15">Candidate review</text><text x="24" y="141" fill="#97a7b6" font-size="15">Reproducibility</text><text x="24" y="169" fill="#97a7b6" font-size="15">Honest uncertainty</text><text x="24" y="197" fill="#58c493" font-size="13">proof required</text></g>
    <g transform="translate(1168 176)"><rect width="208" height="216" rx="18" fill="#172335" stroke="#3157e8"/><text x="24" y="40" fill="#83b9ff" font-size="13" font-weight="700">05 / OUTPUT</text><text x="24" y="79" fill="#f1f5f8" font-size="21" font-weight="700">Public view</text><text x="24" y="113" fill="#a8b7c5" font-size="15">Sanitized fields</text><text x="24" y="141" fill="#a8b7c5" font-size="15">Bounded metrics</text><text x="24" y="169" fill="#a8b7c5" font-size="15">No raw secrets</text><text x="24" y="197" fill="#65a8ff" font-size="13">operator dashboard</text></g>
  </g>
  <g stroke="#59708a" stroke-width="2" marker-end="url(#arrow)"><path d="M292 284h36"/><path d="M568 284h36"/><path d="M844 284h36"/><path d="M1120 284h36"/></g>
  <path d="M64 454h1312" stroke="#263746"/>
  <text x="64" y="495" fill="#8495a5" font-family="ui-monospace,monospace" font-size="14">PRIVACY BOUNDARY</text>
  <text x="238" y="495" fill="#c2ced8" font-family="Inter,Arial,sans-serif" font-size="15">Credentials, raw traffic, private values, and internal logs do not cross into the public projection.</text>
</svg>
